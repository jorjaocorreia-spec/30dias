<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="brandH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="num30" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="rgba(240,237,248,0.85)"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="appshape">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <!-- App icon background -->
  <rect width="512" height="512" rx="112" fill="#0F0F14"/>

  <!-- Mesh background orbs (brand feel) -->
  <circle cx="400" cy="130" r="200" fill="rgba(16,185,129,0.07)" clip-path="url(#appshape)"/>
  <circle cx="120" cy="400" r="180" fill="rgba(139,92,246,0.08)" clip-path="url(#appshape)"/>

  <!-- Calendar rings / argolas (topo) -->
  <rect x="174" y="74" width="24" height="72" rx="12" fill="url(#brand)" filter="url(#glow)"/>
  <rect x="314" y="74" width="24" height="72" rx="12" fill="url(#brand)" filter="url(#glow)"/>

  <!-- Calendar glow border (fora) -->
  <rect x="68" y="112" width="376" height="326" rx="24" fill="none" stroke="url(#brand)" stroke-width="2.5" opacity="0.55"/>

  <!-- Calendar glass body -->
  <rect x="69.5" y="113.5" width="373" height="323" rx="23" fill="rgba(255,255,255,0.035)"/>

  <!-- Calendar header gradient -->
  <rect x="69.5" y="113.5" width="373" height="90" rx="23" fill="url(#brandH)"/>
  <rect x="69.5" y="175" width="373" height="28.5" fill="url(#brandH)"/>

  <!-- Linha separadora sutil abaixo do header -->
  <line x1="69.5" y1="203.5" x2="442.5" y2="203.5" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- "30" — hero number -->
  <text x="256" y="356"
        font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif"
        font-size="190"
        font-weight="900"
        text-anchor="middle"
        fill="#F0EDF8"
        letter-spacing="-6"
        filter="url(#softglow)">30</text>

  <!-- "dias" — label sutil -->
  <text x="256" y="408"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="30"
        font-weight="400"
        text-anchor="middle"
        fill="rgba(240,237,248,0.4)"
        letter-spacing="11">DIAS</text>
</svg>
